name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run formatter
        run: uv run ruff format --check
      - name: Run linters
        run: uv run ruff check
      - name: Run type checkers
        run: uv run pyright
      - name: Run tests
        run: uv run pytest --cov=code_review_agent --cov-branch --cov-report=xml --cov-fail-under=75 --junitxml=junit.xml -o junit_family=legacy
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          report_type: test_results
      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          report_type: coverage