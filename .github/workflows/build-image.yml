# .github/workflows/build-image.yml
name: Build multi-arch image

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUARY_USERNAME }}
          password: ${{ secrets.QUARY_TOKEN }}

      - name: Create short SHA
        if: github.event_name == 'push'
        id: vars
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
        
      - name: Create version from tag name(e.g., v1.2.3 -> 1.2.3)
        if: github.event_name == 'release'
        id: vars-version
        run: echo "VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Build and push latest image
        uses: docker/build-push-action@v7
        if: github.event_name == 'push'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/kuju63/code-review-agent:latest
            quay.io/kuju63/code-review-agent:${{ steps.vars.outputs.SHORT_SHA }}
            
      - name: Build and push tagged image
        uses: docker/build-push-action@v7
        if: github.event_name == 'release'
        with: 
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: quay.io/kuju63/code-review-agent:${{ steps.vars-version.outputs.VERSION }}
