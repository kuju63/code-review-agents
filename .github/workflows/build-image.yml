# .github/workflows/build.yml
name: Build multi-arch image

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Create short SHA
        id: vars
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUARY_USERNAME }}
          password: ${{ secrets.QUARY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/kuju63/code-review-agent:latest
            quay.io/kuju63/code-review-agent:${{ steps.vars.outputs.SHORT_SHA }}

  release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && github.event_name == 'release'
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUARY_USERNAME }}
          password: ${{ secrets.QUARY_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/kuju63/code-review-agent:${{ github.event.release.tag_name }}