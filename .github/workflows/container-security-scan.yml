name: Container Security Scan

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - src/**
      - pyproject.toml
      - uv.lock

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ベースイメージが cgr.dev (Chainguard) と ghcr.io (astral-sh) のみのため
      # Docker Hub への認証は不要。GHA キャッシュでベースレイヤーの再プルを抑制。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: code-review-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # trivy-action に関する注意:
      # 2026-03-19 にサプライチェーン攻撃で大多数のバージョンタグが書き換えられた
      # (CVE-2026-33634, GHSA-69fq-xp46-6x23)
      # v0.35.0 以降は GitHub の immutable releases 機能で保護されており安全
      # さらなる安全性確保には完全な commit SHA へのピン留めを推奨:
      #   uses: aquasecurity/trivy-action@<full-40-char-sha>  # v0.36.0
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: code-review-agent:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
