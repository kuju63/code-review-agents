# code-review-agent Secret テンプレート
#
# 使い方:
#   1. このファイルをコピーして secrets.yaml を作成（.gitignore 対象）
#   2. 各値を base64 エンコードして記入:
#        echo -n "ghp_xxxx"      | base64   # github-token
#        echo -n "sk-xxxx"       | base64   # openai-api-key
#   3. ConfigMap + Secret + Pod + Service をまとめて適用:
#        podman kube play deploy/configmap.yaml deploy/secrets.yaml \
#                         deploy/pod.yaml deploy/service.yaml
#
# NOTE: secrets.yaml は .gitignore に登録済み。実際の値をコミットしないこと。
apiVersion: v1
kind: Secret
metadata:
  name: code-review-agent
type: Opaque
data:
  # GitHub Personal Access Token (read:org, repo スコープ)
  # echo -n "ghp_xxxx" | base64
  github-token: REPLACE_WITH_BASE64_ENCODED_TOKEN

  # OpenAI API Key
  # echo -n "sk-xxxx" | base64
  openai-api-key: REPLACE_WITH_BASE64_ENCODED_TOKEN
