# code-review-agent Pod
#
# 使い方:
#   podman kube play deploy/configmap.yaml deploy/secret.yaml \
#                    deploy/pod.yaml deploy/service.yaml
#
# 事前準備:
#   deploy/secret.yaml.example をコピーして deploy/secret.yaml を作成し、
#   github-token と openai-api-key を base64 エンコード済みの値に置換すること。
#
# NOTE: livenessProbe / readinessProbe はイメージフォーマット（OCI/Docker）に
#       依存しない K8s ネイティブのヘルスチェック機構であり、
#       Dockerfile の HEALTHCHECK の代替として機能する。
apiVersion: v1
kind: Pod
metadata:
  name: code-review-agent
  labels:
    app: code-review-agent
spec:
  containers:
    - name: code-review-agent
      image: quay.io/kuju63/code-review-agent:latest
      ports:
        - containerPort: 8000
          protocol: TCP
      envFrom:
        - configMapRef:
            name: code-review-agent
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: code-review-agent
              key: github-token
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: code-review-agent
              key: openai-api-key
      # Dockerfile HEALTHCHECK と同一パラメータで揃える:
      #   --start-period=10s → initialDelaySeconds: 10
      #   --interval=30s     → periodSeconds: 30
      #   --timeout=5s       → timeoutSeconds: 5
      #   --retries=3        → failureThreshold: 3
      #
      # NOTE: httpGet ではなく exec プローブを使用する。
      #   podman kube play は httpGet を "curl -f URL" に変換するが、
      #   Chainguard イメージにはシェルも curl も存在しないため失敗する。
      #   exec プローブは CMD-SHELL を経由せず Python を直接実行するため動作する。
      livenessProbe:
        exec:
          command:
            - /usr/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        exec:
          command:
            - /usr/bin/python
            - -c
            - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532   # Chainguard nonroot (Dockerfile USER nonroot)
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
  restartPolicy: Always
